<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products | LifeMD</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#07111f;
      --card:#101c2c;
      --card-light:#16263a;
      --primary:#3b82f6;
      --primary-hover:#2563eb;
      --text:#f8fafc;
      --muted:#94a3b8;
      --border:rgba(255,255,255,0.08);
      --shadow:0 12px 30px rgba(0,0,0,0.35);
      --radius:20px;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(to bottom,#07111f,#0d1726);
      color:var(--text);
      line-height:1.6;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
    }

    section{
      padding:90px 0;
    }

    h1,h2,h3{
      margin-bottom:15px;
    }

    p{
      color:var(--muted);
    }

    .btn{
      background:var(--primary);
      color:white;
      border:none;
      padding:14px 24px;
      border-radius:14px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
      display:inline-block;
      box-shadow:0 0 20px rgba(59,130,246,0.3);
    }

    .btn:hover{
      background:var(--primary-hover);
      transform:translateY(-2px);
    }

    .btn-outline{
      background:transparent;
      border:1px solid var(--primary);
      box-shadow:none;
    }

    .btn-outline:hover{
      background:var(--primary);
    }

    /* NAVIGATION */
    .navbar{
      background:rgba(7,17,31,0.95);
      backdrop-filter:blur(10px);
      padding:20px 0;
      position:sticky;
      top:0;
      z-index:1000;
      border-bottom:1px solid var(--border);
    }

    .nav-container{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:20px;
    }

    .logo{
      font-size:1.8rem;
      font-weight:bold;
    }

    .logo span{
      color:var(--primary);
    }

    .nav-links{
      display:flex;
      gap:30px;
      align-items:center;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:var(--text);
      text-decoration:none;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:var(--primary);
    }

    .section-title{
      text-align:center;
      margin-bottom:50px;
    }

    .section-title h2{
      font-size:2.4rem;
    }

    /* PRODUCTS GRID */
    .products-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:30px;
    }

    .product-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      transition:0.3s;
      box-shadow:var(--shadow);
    }

    .product-card:hover{
      transform:translateY(-6px);
    }

    .product-image{
      height:220px;
      background:#0a1220;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .product-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .product-content{
      padding:25px;
    }

    .price{
      color:#60a5fa;
      font-size:1.3rem;
      font-weight:bold;
      margin:15px 0;
    }

    .old-price{
      color:var(--muted);
      font-size:0.9rem;
      text-decoration:line-through;
      margin-left:10px;
    }

    .badge{
      display:inline-block;
      background:#22c55e;
      font-size:0.7rem;
      padding:4px 10px;
      border-radius:20px;
      margin-bottom:10px;
    }

    /* CART */
    .cart{
      position:fixed;
      top:90px;
      right:20px;
      width:340px;
      background:rgba(16,28,44,0.98);
      border:1px solid var(--border);
      border-radius:20px;
      padding:25px;
      z-index:999;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      max-height:80vh;
      overflow-y:auto;
    }

    .cart h3{
      margin-bottom:20px;
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:10px;
    }

    .cart-controls{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty-btn{
      width:28px;
      height:28px;
      border:none;
      border-radius:8px;
      background:var(--primary);
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .total{
      margin-top:20px;
      font-size:1.2rem;
      font-weight:bold;
    }

    /* FOOTER */
    footer{
      background:#050b14;
      padding:50px 0;
      text-align:center;
      border-top:1px solid rgba(255,255,255,0.06);
      margin-top:50px;
    }

    @media(max-width:900px){
      .cart{
        position:relative;
        width:100%;
        right:auto;
        top:auto;
        margin:20px auto;
        max-height:none;
      }
      .nav-container{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">Life<span>MD</span></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html" style="color:var(--primary);">Products</a>
        <a href="checkout.html">Checkout</a>
        <a href="index.html#booking">Consult</a>
      </div>
    </div>
  </nav>

  <section>
    <div class="container">
      <div class="section-title">
        <h2>All Products</h2>
        <p>Browse our wellness essentials recommended by telehealth professionals</p>
      </div>

      <div class="products-grid" id="productsGrid"></div>
    </div>
  </section>

  <div class="cart">
    <h3>🛒 Order Summary</h3>
    <div id="cart-items"></div>
    <div class="total">Total: $<span id="cart-total">0.00</span></div>
    <a href="checkout.html" class="btn" style="width:100%; margin-top:20px; text-align:center;">Proceed to Checkout</a>
  </div>

  <footer>
    <div class="container">
      <h3>LifeMD</h3>
      <p>Email: support@lifemd.com</p>
      <p>Disclaimer: Not for emergencies. Call 911 for urgent care.</p>
    </div>
  </footer>

  <script>
    const products = [
      { id:1, name:"Immune Support Vitamins", price:24.99, category:"Vitamins", badge:"Best Seller", image:"images/vitamins.jpg" },
      { id:2, name:"Blood Pressure Monitor", price:59.99, category:"Devices", badge:"Doctor Recommended", image:"images/bpmonitor.jpg" },
      { id:3, name:"Sleep Wellness Gummies", price:18.50, category:"Supplements", badge:"New", image:"images/gummies.jpg" },
      { id:4, name:"Digital Thermometer", price:22.99, category:"Devices", image:"images/thermometer.jpg" },
      { id:5, name:"Stress Relief Tea", price:14.99, category:"Wellness", badge:"Organic", image:"images/tea.jpg" },
      { id:6, name:"Pulse Oximeter", price:29.99, category:"Devices", badge:"Essential", image:"images/pulseox.jpg" },
      { id:7, name:"Tirzepatide 30mg/3mL", price:199.99, category:"Prescription", badge:"Rx Required", image:"images/tirzepatide.jpg" }
      { id:7, name:"Tirzepatide 20mg/4mL", price:99.99, category:"Prescription", badge:"Rx Required", image:"images/tirzepatide.jpg" }
      { id:7, name:"Tirzepatide 40mg/4mL", price:299.99, category:"Prescription", badge:"Rx Required", image:"images/tirzepatide.jpg" }  
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function saveCart(){
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function addToCart(name, price){
      const existing = cart.find(item => item.name === name);
      if(existing){
        existing.quantity++;
      } else {
        cart.push({ name, price, quantity:1 });
      }
      saveCart();
      renderCart();
    }

    function changeQty(name, amount){
      const item = cart.find(item => item.name === name);
      if(!item) return;
      item.quantity += amount;
      if(item.quantity <= 0){
        cart = cart.filter(i => i.name !== name);
      }
      saveCart();
      renderCart();
    }

    function renderCart(){
      const cartItems = document.getElementById("cart-items");
      const cartTotal = document.getElementById("cart-total");
      if(!cartItems) return;
      cartItems.innerHTML = "";
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.quantity;
        const div = document.createElement("div");
        div.classList.add("cart-item");
        div.innerHTML = `
          <div><strong>${item.name}</strong><br>$${item.price.toFixed(2)}</div>
          <div class="cart-controls">
            <button class="qty-btn" onclick="changeQty('${item.name}',-1)">-</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="changeQty('${item.name}',1)">+</button>
          </div>
        `;
        cartItems.appendChild(div);
      });
      cartTotal.textContent = total.toFixed(2);
    }

    function renderProducts(){
      const grid = document.getElementById("productsGrid");
      if(!grid) return;
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-image">
            <img src="${p.image}" alt="${p.name}" onerror="this.src='https://placehold.co/300x220?text=Image+Not+Found'">
          </div>
          <div class="product-content">
            ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
            <h3>${p.name}</h3>
            <p>${p.category}</p>
            <div class="price">$${p.price.toFixed(2)}</div>
            <button class="btn" onclick="addToCart('${p.name}',${p.price})">Add to Order</button>
          </div>
        </div>
      `).join('');
    }

    renderProducts();
    renderCart();
  </script>
</body>
</html>
